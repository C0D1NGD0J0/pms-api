name: Nightly Tests

on:
  schedule:
    # 2:00 AM UTC daily
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: false

env:
  NODE_ENV: test
  NODE_VERSION: "22"
  JWT_SECRET: ci-test-secret
  JWT_REFRESH_SECRET: ci-test-refresh-secret

jobs:
  full-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.build.json

      - name: Run unit tests
        run: npm test

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ runner.arch }}

      - name: Run integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  notify-on-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [full-suite]
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create GitHub issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'nightly-failure';
            const title = `Nightly build failed — ${new Date().toISOString().split('T')[0]}`;

            // Ensure the label exists before creating an issue with it
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'e11d48',
                  description: 'Nightly CI test suite failure',
                });
              }
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labelName,
              state: 'open',
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Still failing as of ${new Date().toISOString()}.\n[Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The nightly test suite failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: [labelName],
              });
            }
