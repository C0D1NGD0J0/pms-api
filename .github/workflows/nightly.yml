name: Nightly Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly:
    name: Full Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit -p tsconfig.build.json

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test

      # Integration tests run on PRs only (ci.yml).
      # Add them here when you have multiple contributors or flaky-test concerns.

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly tests failed. Check the Actions tab for details."
